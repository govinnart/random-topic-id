<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Topik Acak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #F9F5EB;
            color: #1A3C34;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .topic-window {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: white;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            text-align: center;
        }
        .topic-window h1 {
            font-size: 2rem;
            font-weight: bold;
        }
        .topic-window p {
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .spin-btn {
            background-color: #2A5A4E;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .spin-btn:hover {
            background-color: #1A3C34;
        }
    </style>
</head>
<body>
    <div class="topic-window">
        <h1>Generator Topik Acak</h1>
        <p id="topic-text">Topik apa yang akan muncul?</p>
        <button class="spin-btn" id="spin-btn">Putar Roda</button>
    </div>
    <script src="/mnt/data/script.js"></script>
</body>
</html>
