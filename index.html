<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impromptu - Random Topic Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #F9F5EB;
            color: #1A3C34;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
        }

        .left-panel, .right-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .title-img {
            max-width: 80%;
        }

        .topic-window {
            width: 100%;
            height: 200px;
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        .topic-text {
            font-size: 2rem;
            font-weight: 600;
            color: #1A3C34;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #2A5A4E, #1A3C34);
            border: 2px solid #1A3C34;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0px 6px 16px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 1.5rem;
            }

            .title-img {
                max-width: 70%;
            }

            .topic-text {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .title-img {
                max-width: 100%;
            }

            .topic-text {
                font-size: 1.2rem;
            }

            .btn {
                padding: 1rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left-panel">
            <img src="title.png" alt="Impromptu Speaking" class="title-img">
            <p>Pull the lever, get a random topic, and start speaking!</p>
        </div>

        <div class="right-panel">
            <div class="topic-window">
                <p id="topicText" class="topic-text">Click to get a topic!</p>
            </div>
            <button class="btn" id="spinBtn">Spin!</button>
        </div>
    </div>

    <script src="topics.js"></script>
    <script src="script.js"></script>
    <script>
        const spinBtn = document.getElementById("spinBtn");
        const topicText = document.getElementById("topicText");

        spinBtn.addEventListener("click", function () {
            // Get a random topic from the topics array
            const randomTopic = getRandomTopic();
            topicText.textContent = randomTopic;
        });

        function getRandomTopic() {
            // Assuming topics.js has an array named 'topics'
            const randomIndex = Math.floor(Math.random() * topics.length);
            return topics[randomIndex];
        }
    </script>
</body>

</html>
