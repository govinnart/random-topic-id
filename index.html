<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Topik Acak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #F9F5EB;
            color: #1A3C34;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            padding: 2rem 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topic-window {
            width: 100%;
            min-width: 0;
            margin-top: 75px;
            height: 390px;
            position: relative;
            overflow: hidden;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            box-shadow: inset 0 20px 30px -20px rgba(0, 0, 0, 0.06), inset 0 -20px 30px -20px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .spin-btn {
            background-color: #2A5A4E;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .spin-btn:hover {
            background-color: #1A3C34;
        }

        .reel-strip {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            will-change: transform;
        }

        .reel-item {
            width: 100%;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            line-height: 1.15;
            color: #1A3C34;
            padding: 0 1rem;
            user-select: none;
            overflow-wrap: break-word;
        }

        .reel-center-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 130px;
            border-top: 1px solid rgba(26, 60, 52, 0.08);
            border-bottom: 1px solid rgba(26, 60, 52, 0.08);
            pointer-events: none;
            z-index: 2;
        }

        .spin-btn-row {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .spin-btn {
            display: inline-block;
            padding: 0.6rem 2.2rem;
            font-family: 'Baloo 2', cursive;
            font-size: 1.1rem;
            font-weight: 700;
            color: #F9F5EB;
            background: linear-gradient(135deg, #2A5A4E, #1A3C34);
            border: 2px solid #1A3C34;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(26, 60, 52, 0.3);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .spin-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 6px rgba(26, 60, 52, 0.3);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topic-window">
            <h1>Generator Topik Acak</h1>
            <p id="topic-text">Topik apa yang akan muncul?</p>
            <div class="spin-btn-row">
                <button class="spin-btn" id="spin-btn">Putar Roda</button>
            </div>
        </div>
    </div>

    <script>
        const topics = [
            "Teknologi",
            "Keuangan",
            "Kesehatan",
            "Pendidikan",
            "Bisnis",
            "Politik",
            "Lingkungan",
            "Sejarah",
            "Sosial",
            "Sains"
        ];

        function getRandomTopic() {
            const randomIndex = Math.floor(Math.random() * topics.length);
            return topics[randomIndex];
        }

        document.getElementById('spin-btn').addEventListener('click', () => {
            const topic = getRandomTopic();
            document.getElementById('topic-text').textContent = topic;
        });
    </script>
</body>
</html>
