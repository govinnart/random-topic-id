        .topic-window {

            position: relative;

        }

            border: none;

            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 20px;
        }

        .spin-btn:hover {
            background-color: #1A3C34;
        }

        .reel-strip {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            will-change: transform;
        }

        .reel-item {
            width: 100%;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            line-height: 1.15;
            color: #1A3C34;
            padding: 0 1rem;
            user-select: none;
            overflow-wrap: break-word;
        }

        .reel-center-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 130px;
            border-top: 1px solid rgba(26, 60, 52, 0.08);
            border-bottom: 1px solid rgba(26, 60, 52, 0.08);
            pointer-events: none;
            z-index: 2;
        }

        .spin-btn-row {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        .spin-btn {
            display: inline-block;
            padding: 0.6rem 2.2rem;
            font-family: 'Baloo 2', cursive;
            font-size: 1.1rem;
            font-weight: 700;
            color: #F9F5EB;
            background: linear-gradient(135deg, #2A5A4E, #1A3C34);
            border: 2px solid #1A3C34;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(26, 60, 52, 0.3);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .spin-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 6px rgba(26, 60, 52, 0.3);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Adjustments for large text and spin wheel effect */
        .reel-item {
            font-size: 3rem; /* Increase font size for larger topics */
        }
    </style>
